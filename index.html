<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Паркур: Зональное управление</title>
    <style>
        * { touch-action: none; -webkit-tap-highlight-color: transparent; -webkit-touch-callout: none; user-select: none; box-sizing: border-box; }
        body { margin: 0; padding: 0; overflow: hidden; background: #111; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; }
        canvas { display: block; background: #fff; width: 100vw; height: 100vh; max-width: 450px; box-shadow: 0 0 50px rgba(0,0,0,0.5); }
        #ui { position: absolute; top: 15px; color: #333; font-size: 24px; font-weight: bold; pointer-events: none; z-index: 5; text-align: center; width: 100%; max-width: 450px; }
        #boss-hp-ui { position: absolute; top: 60px; width: 80%; max-width: 350px; height: 16px; background: #333; border: 2px solid #000; border-radius: 10px; overflow: hidden; opacity: 0; transition: opacity 0.5s; z-index: 5; }
        #boss-hp-bar { width: 100%; height: 100%; background: linear-gradient(90deg, #ff0000, #b30000); }
        #boss-hp-ui.active { opacity: 1; }
        #sticky-timer { color: #32CD32; font-size: 18px; opacity: 0; transition: opacity 0.3s; font-weight: bold; }
        #sticky-timer.active { opacity: 1; }
        #menu { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(255,255,255,0.98); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 40; text-align: center; opacity: 0; visibility: hidden; transition: opacity 0.4s ease; }
        #menu.active { opacity: 1; visibility: visible; }
        .btn { padding: 20px; margin: 10px; font-size: 24px; cursor: pointer; background: #222; color: white; border: none; border-radius: 50px; width: 80%; max-width: 280px; font-weight: bold; }
        h1 { font-size: 48px; color: #222; margin-bottom: 20px; letter-spacing: 4px; }
    </style>
</head>
<body>
    <div id="ui">Счет: <span id="score">0</span><div id="sticky-timer">СЛИЗЬ: <span id="time-left">5</span>с</div></div>
    <div id="boss-hp-ui"><div id="boss-hp-bar"></div></div>
    <div id="menu" class="active"><h1 id="title">-ПАРКУР-</h1><button class="btn" onclick="startGame()">ИГРАТЬ</button></div>
    <canvas id="gameCanvas"></canvas>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
const scoreElement = document.getElementById("score");
const timerBox = document.getElementById("sticky-timer");
const timeLeftElement = document.getElementById("time-left");
const bossHPUI = document.getElementById("boss-hp-ui");
const bossHPBar = document.getElementById("boss-hp-bar");
const menu = document.getElementById("menu");

function resize() { canvas.width = Math.min(window.innerWidth, 450); canvas.height = window.innerHeight; }
window.addEventListener('resize', resize); resize();

let player, platforms, monsters, bullets, particles, score, platformCount, lastPlatformX, lastPlatformY, keys = {};
let gameActive = false, isDying = false, curtainY = -canvas.height, boss = null, bossBattleActive = false, stickyInterval = null;

function init() {
    player = { x: canvas.width/2 - 12, y: canvas.height - 100, w: 25, h: 25, dy: 0, dx: 0, speed: 7, jump: -16, gravity: 0.7, isSticky: false };
    score = 0; platformCount = 0; scoreElement.innerText = score;
    platforms = []; monsters = []; bullets = []; particles = [];
    lastPlatformX = canvas.width/2 - 40; lastPlatformY = canvas.height - 50;
    isDying = false; curtainY = -canvas.height; boss = null; bossBattleActive = false;
    bossHPUI.classList.remove('active'); timerBox.classList.remove('active');
    if (stickyInterval) clearInterval(stickyInterval);
    platforms.push({ id: "s", x: 0, y: lastPlatformY, w: canvas.width, h: 20, type: 'normal' });
    for (let i = 1; i < 10; i++) addPlatform(lastPlatformY - 130);
    menu.classList.remove('active');
}

function startBoss() {
    bossBattleActive = true; bossHPUI.classList.add('active');
    boss = { x: 0, y: canvas.height + 200, w: canvas.width, h: 120, hp: 100 };
}

function applyStickers() {
    player.isSticky = true; player.jump = -8.5; player.speed = 3.5;
    let timeLeft = 5; timerBox.classList.add('active'); timeLeftElement.innerText = timeLeft;
    if (stickyInterval) clearInterval(stickyInterval);
    stickyInterval = setInterval(() => {
        timeLeft--; timeLeftElement.innerText = timeLeft;
        if (timeLeft <= 0) { player.isSticky = false; player.jump = -16; player.speed = 7; timerBox.classList.remove('active'); clearInterval(stickyInterval); }
    }, 1000);
}

function addPlatform(y) {
    platformCount++;
    let id = Math.random();
    let isTurret = !bossBattleActive && platformCount % 20 === 0;
    let isBoost = !isTurret && !bossBattleActive && Math.random() < 0.15;
    let pWidth = isTurret ? 220 : 80;
    let newX = Math.random() * (canvas.width - pWidth - 20) + 10;
    if (Math.abs(newX - lastPlatformX) > 170) newX = lastPlatformX + (newX > lastPlatformX ? 140 : -140);
    newX = Math.max(10, Math.min(canvas.width - pWidth - 10, newX));
    lastPlatformX = newX; lastPlatformY = y;
    let p = { id: id, x: newX, y: y, w: pWidth, h: 16, type: isBoost ? 'boost' : 'normal', isTurretBase: isTurret };
    platforms.push(p);
    if (isTurret) monsters.push({ parentId: id, parent: p, type: 'turret', lastShot: 0, x: p.x + (p.w/2) - 15, y: p.y - 30 });
    else if (!bossBattleActive && platformCount % 15 === 0) monsters.push({ parentId: id, parent: p, type: 'jumper', activated: false, x: p.x + 25, y: p.y - 30 });
    else if (!bossBattleActive && platformCount % 12 === 0) monsters.push({ parentId: id, parent: p, type: 'sticker', x: p.x + 25, y: p.y - 15 });
}

function triggerDeath() {
    if (isDying) return; isDying = true;
    if (window.navigator.vibrate) window.navigator.vibrate(200);
    for(let i=0; i<30; i++) particles.push({ x: player.x+12, y: player.y+12, dx: (Math.random()-0.5)*12, dy: (Math.random()-0.5)*12, life: 1 });
}

function startGame() { init(); gameActive = true; update(); }

// --- ПОЧИНЕННОЕ УПРАВЛЕНИЕ ---
function handleTouch(e) {
    if (!gameActive || isDying) return;
    e.preventDefault();
    const touch = e.touches[0];
    const midX = window.innerWidth / 2;
    if (touch.clientX < midX) {
        keys["ArrowLeft"] = true;
        keys["ArrowRight"] = false;
    } else {
        keys["ArrowRight"] = true;
        keys["ArrowLeft"] = false;
    }
}

canvas.addEventListener("touchstart", handleTouch, {passive: false});
canvas.addEventListener("touchmove", handleTouch, {passive: false});
canvas.addEventListener("touchend", (e) => {
    e.preventDefault();
    keys["ArrowLeft"] = false;
    keys["ArrowRight"] = false;
}, {passive: false});

window.addEventListener("keydown", e => keys[e.code] = true);
window.addEventListener("keyup", e => keys[e.code] = false);
// -----------------------------

function update() {
    if (!gameActive) return;
    if (score >= 100 && !bossBattleActive && !isDying) startBoss();
    if (isDying) {
        curtainY += 20; particles.forEach(p => { p.x += p.dx*0.5; p.y += p.dy*0.5; p.dy += 0.2; p.life -= 0.02; });
        if (curtainY >= 0) { gameActive = false; document.getElementById("title").innerText = "СЧЕТ: " + score; menu.classList.add('active'); }
    } else {
        if (keys["ArrowLeft"]) player.dx = -player.speed;
        else if (keys["ArrowRight"]) player.dx = player.speed;
        else player.dx *= 0.82;
        player.dy += player.gravity; player.x += player.dx; player.y += player.dy;
        if (player.x < -player.w) player.x = canvas.width;
        if (player.x > canvas.width) player.x = -player.w;

        if (boss) {
            boss.y -= 2.2; 
            if (player.y + player.h > boss.y) triggerDeath();
            boss.hp -= 0.05; bossHPBar.style.width = boss.hp + "%";
            if (boss.hp <= 0) { boss = null; bossBattleActive = false; bossHPUI.classList.remove('active'); score += 500; }
        }

        platforms.forEach(p => {
            if (player.dy > 0 && player.y+player.h >= p.y && player.y+player.h <= p.y+p.h+player.dy && player.x+player.w > p.x && player.x < p.x+p.w) {
                player.dy = (p.type === 'boost') ? player.jump * 1.9 : player.jump;
                player.y = p.y - player.h;
            }
        });

        for (let i = monsters.length - 1; i >= 0; i--) {
            let m = monsters[i];
            let dir = player.x < m.x ? -1 : 1;
            if (m.type === 'turret') {
                m.x = m.parent.x + m.parent.w/2 - 15; m.y = m.parent.y - 30;
                if (Date.now() - m.lastShot > 1900) { bullets.push({ x: m.x+15, y: m.y+15, dx: dir * 5, yPos: m.y+15 }); m.lastShot = Date.now(); }
            } else if (m.type === 'jumper') {
                if (!m.activated) {
                    m.x = m.parent.x+25; m.y = m.parent.y-30;
                    if (Math.sqrt((player.x-m.x)**2 + (player.y-m.y)**2) < 250) m.activated = true;
                } else {
                    if (!m.vxSet) {
                        let angle = Math.atan2(player.y-m.y, player.x-m.x);
                        m.vX = Math.cos(angle)*8; m.vY = Math.sin(angle)*8-5; m.vxSet = true;
                    }
                    m.x += m.vX; m.y += m.vY; m.vY += 0.25;
                }
            } else if (m.type === 'sticker') {
                m.x = m.parent.x+25; m.y = m.parent.y-15;
                if (player.x < m.x+30 && player.x+player.w > m.x && player.y+player.h > m.y && player.y < m.y+15) { applyStickers(); monsters.splice(i,1); continue; }
            }
            if (m.type !== 'sticker' && player.x < m.x+30 && player.x+player.w > m.x && player.y < m.y+30 && player.y+player.h > m.y) triggerDeath();
            if (m.y > canvas.height + 100) monsters.splice(i, 1);
        }

        bullets.forEach(b => { b.x += b.dx; if (player.x < b.x+6 && player.x+player.w > b.x-6 && player.y < b.yPos+6 && player.y+player.h > b.yPos-6) triggerDeath(); });

        if (player.y < canvas.height * 0.4) {
            let diff = canvas.height * 0.4 - player.y; player.y = canvas.height * 0.4;
            platforms.forEach(p => p.y += diff); bullets.forEach(b => b.yPos += diff);
            if (boss) boss.y += diff; lastPlatformY += diff;
            for (let i = platforms.length - 1; i >= 0; i--) {
                if (platforms[i].y > canvas.height) {
                    let pid = platforms[i].id; monsters = monsters.filter(m => m.parentId !== pid);
                    platforms.splice(i, 1); addPlatform(lastPlatformY - 130); score++; scoreElement.innerText = score;
                }
            }
        }
        if (player.y > canvas.height) triggerDeath();
    }
    draw();
    requestAnimationFrame(update);
}

function draw() {
    ctx.fillStyle = "#fff"; ctx.fillRect(0, 0, canvas.width, canvas.height);
    platforms.forEach(p => {
        ctx.fillStyle = p.isTurretBase ? "#333" : (p.type === 'boost' ? "#0077ff" : "#ccc");
        ctx.fillRect(p.x, p.y, p.w, p.h);
    });
    if (boss) {
        ctx.fillStyle = "rgba(50, 205, 50, 0.95)"; ctx.fillRect(boss.x, boss.y, boss.w, boss.h);
        ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(100, boss.y+40, 25, 0, 7); ctx.arc(350, boss.y+40, 25, 0, 7); ctx.fill();
        ctx.fillStyle = "black"; ctx.beginPath(); ctx.arc(100, boss.y+40, 10, 0, 7); ctx.arc(350, boss.y+40, 10, 0, 7); ctx.fill();
    }
    monsters.forEach(m => {
        let dir = player.x < m.x ? -1 : 1;
        if (m.type === 'turret') {
            ctx.fillStyle = "#ffd700"; ctx.fillRect(m.x, m.y, 30, 30);
            ctx.fillStyle = "#000"; ctx.fillRect(m.x+6+dir, m.y+6, 4, 4); ctx.fillRect(m.x+20+dir, m.y+6, 4, 4);
            ctx.beginPath(); ctx.arc(m.x+15+dir*3, m.y+20, 5, 0, 7); ctx.fillStyle = "#333"; ctx.fill();
        } else if (m.type === 'jumper') {
            ctx.fillStyle = "#9400d3"; ctx.fillRect(m.x, m.y, 30, 30);
            ctx.fillStyle = "#fff"; ctx.fillRect(m.x+5+dir, m.y+5, 7, 7); ctx.fillRect(m.x+18+dir, m.y+5, 7, 7);
            ctx.fillStyle = "#000"; ctx.fillRect(m.x+5, m.y+18, 20, 8);
            ctx.fillStyle = "#fff"; for(let j=0; j<4; j++) { ctx.fillRect(m.x + 6 + j*5, m.y + 18, 2, 2); ctx.fillRect(m.x + 6 + j*5, m.y + 23, 2, 2); }
        } else {
            ctx.fillStyle = "#32CD32"; ctx.beginPath(); ctx.arc(m.x+15, m.y+15, 12, 3.14, 0); ctx.fill();
            ctx.fillStyle = "white"; ctx.beginPath(); ctx.arc(m.x+15, m.y+10, 4, 0, 7); ctx.fill();
        }
    });
    ctx.fillStyle = "red"; bullets.forEach(b => { ctx.beginPath(); ctx.arc(b.x, b.yPos, 6, 0, 7); ctx.fill(); });
    if (!isDying) { ctx.fillStyle = player.isSticky ? "#32CD32" : "#ff4444"; ctx.fillRect(player.x, player.y, player.w, player.h); }
    else { particles.forEach(p => { if (p.life > 0) { ctx.fillStyle = `rgba(255,68,68,${p.life})`; ctx.fillRect(p.x, p.y, 6, 6); } }); }
    if (isDying) { ctx.fillStyle = "#000"; ctx.fillRect(0, curtainY, canvas.width, canvas.height); }
}
</script>
</body>
</html>
